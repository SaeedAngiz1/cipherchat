<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="CipherChat animated hero banner">
  <title>CipherChat — end-to-end encrypted messaging</title>
  <desc>Animated SVG hero banner showing a sealed envelope opening to reveal an encrypted chat bubble with a lock icon and "E2E · ON" badge.</desc>

  <!-- ───────────────────────────── background ───────────────────────────── -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#0f0d1f"/>
      <stop offset="0.5" stop-color="#15112e"/>
      <stop offset="1"   stop-color="#1c1640"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#5b3df5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#7c5cff" stop-opacity="0.5"/>
      <stop offset="0.6" stop-color="#7c5cff" stop-opacity="0.1"/>
      <stop offset="1"   stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#5b3df5" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="720" height="200" rx="16" ry="16" fill="url(#bg)"/>
  <circle cx="120" cy="100" r="100" fill="url(#glow)"/>
  <circle cx="600" cy="100" r="100" fill="url(#glow)" opacity="0.6"/>

  <!-- ───────────────────────────── typing dots ──────────────────────────── -->
  <g transform="translate(36 165)">
    <circle cx="0"  cy="0" r="5" fill="#7c5cff">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="14" cy="0" r="5" fill="#7c5cff">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="28" cy="0" r="5" fill="#7c5cff">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ───────────────────────────── title text ───────────────────────────── -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
     font-weight="700" text-anchor="middle">
    <text x="360" y="62" font-size="34" fill="#ecebff" letter-spacing="-0.5">
      🛡️ CipherChat
      <animate attributeName="opacity" values="1;0.85;1" dur="3s" repeatCount="indefinite"/>
    </text>
    <text x="360" y="92" font-size="14" fill="#b9b6da" font-weight="500">
      End-to-End Encrypted Messaging
    </text>
  </g>

  <!-- ───────────────────────────── chat bubble ──────────────────────────── -->
  <g transform="translate(232 118)" filter="url(#softShadow)">
    <rect x="0" y="0" width="256" height="44" rx="14" ry="14" fill="url(#bubble)" stroke="#7c5cff" stroke-opacity="0.6"/>
    <text x="18" y="28" font-family="ui-monospace, JetBrains Mono, Menlo, monospace"
          font-size="14" fill="#fff" font-weight="600">hi 🔒</text>
    <!-- pulsing lock badge -->
    <g transform="translate(218 8)">
      <rect x="0" y="0" width="32" height="20" rx="10" fill="#6dd58c" fill-opacity="0.18"
            stroke="#6dd58c" stroke-opacity="0.6">
        <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/>
      </rect>
      <text x="16" y="14" font-family="ui-sans-serif, system-ui" font-size="9.5"
            fill="#6dd58c" font-weight="700" letter-spacing="0.5" text-anchor="middle">🔒 ON</text>
    </g>
  </g>

  <!-- ───────────────────────────── floating envelope → open loop ─────────── -->
  <g transform="translate(560 90)">
    <!-- Sealed envelope, fades out -->
    <g opacity="1">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="4s" repeatCount="indefinite"/>
      <rect x="-30" y="-22" width="60" height="44" rx="6" fill="#1c1640" stroke="#7c5cff" stroke-width="当期"/>
      <path d="M -30 -22 L 0 4 L 30 -22" stroke="#7c5cff" stroke-width="2" fill="none"/>
      <text x="0" y="34" font-family="ui-sans-serif" font-size="9" fill="#8580b3" text-anchor="middle">
        sealing…
      </text>
    </g>
    <!-- Opened envelope (layers) — fades in after seal fades out -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4;0.5;0.9;1" dur="4s" repeatCount="indefinite"/>
      <rect x="-30" y="-22" width="60" height="44" rx="6" fill="#1c1640" stroke="#6dd58c" stroke-width="2"/>
      <text x="0" y="6" font-family="ui-sans-serif, system-ui" font-size="20" fill="#6dd58c" text-anchor="middle">🔓</text>
      <text x="0" y="34" font-family="ui-sans-serif" font-size="9" fill="#6dd58c" text-anchor="middle">
        decrypted
        <animate attributeName="opacity" values="0;1;1" dur="1.2s" begin="2s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <!-- ───────────────────────────── subtle crypto bytes drift ────────────── -->
  <g font-family="ui-monospace, JetBrains Mono, monospace" font-size="9" fill="#8580b3" opacity="0.7">
    <text x="20"  y="30">a1f3</text>
    <text x="60"  y="30">9c01</text>
    <text x="100" y="30">ee27</text>
    <text x="620" y="30">7b3d</text>
    <text x="660" y="30">4ad9</text>
  </g>

  <!-- ───────────────────────────── E2E badge ────────────────────────────── -->
  <g transform="translate(540 165)">
    <rect x="0" y="0" width="160" height="22" rx="11" fill="#6dd58c" fill-opacity="0.12"
          stroke="#6dd58c" stroke-opacity="0.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <text x="80" y="15" font-family="ui-sans-serif, system-ui" font-size="10.5"
          fill="#6dd58c" font-weight="700" letter-spacing="1.5" text-anchor="middle">
      E2E · ALWAYS ON
    </text>
  </g>
</svg>
